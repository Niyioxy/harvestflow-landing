<svg width="520" height="200" viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>HarvestFlow</title>
  <desc>Leaf and wave logo with gold wordmark for HarvestFlow</desc>
  <defs>
    <style>
      .wordmark { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-size: 46px; font-weight: 700; fill: #E8A020; letter-spacing: -0.5px; }
      .tagline   { font-family: Georgia, 'Times New Roman', serif; font-size: 9.5px; fill: #B87A10; letter-spacing: 3.2px; }
    </style>
  </defs>

  <!-- Water waves -->
  <path d="M34 128 Q54 104 76 114 Q98 124 118 100" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M38 144 Q58 120 80 130 Q102 140 122 116" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Left leaf -->
  <path d="M76 112 Q40 72 28 30 Q44 44 58 68 Q70 90 76 112Z" fill="#4ade80"/>
  <path d="M76 108 Q42 70 30 33" stroke="#22c55e" stroke-width="1" fill="none" opacity="0.55"/>

  <!-- Right leaf -->
  <path d="M76 92 Q108 56 120 14 Q108 28 94 50 Q84 72 76 92Z" fill="#22c55e" opacity="0.85"/>
  <path d="M76 89 Q106 55 118 17" stroke="#16a34a" stroke-width="0.9" fill="none" opacity="0.5"/>

  <!-- Stem node -->
  <circle cx="76" cy="114" r="6" fill="#4ade80"/>
  <circle cx="76" cy="114" r="3" fill="#F5C455"/>

  <!-- Wordmark -->
  <text class="wordmark" x="148" y="110">HarvestFlow</text>

  <!-- Divider -->
  <line x1="148" y1="125" x2="508" y2="125" stroke="#E8A020" stroke-width="0.7" opacity="0.35"/>

  <!-- Tagline -->
  <text class="tagline" x="150" y="141">SOW THE SEED. TRACK THE GROWTH.</text>
</svg>
